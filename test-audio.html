<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>百度翻译音频测试</h1>

    <div>
        <button onclick="testAudio('hello')">测试: hello</button>
        <button onclick="testAudio('apple')">测试: apple</button>
        <button onclick="testAudio('cat')">测试: cat</button>
    </div>

    <div class="result" id="result">
        点击按钮测试音频播放
    </div>

    <script>
        function testAudio(word) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = `正在播放: ${word}...`;

            // 生成百度翻译音频URL
            const audioUrl = `https://fanyi.baidu.com/gettts?lan=en&text=${encodeURIComponent(word)}&spd=3&source=web`;

            console.log('音频URL:', audioUrl);

            // 创建音频对象
            const audio = new Audio(audioUrl);

            audio.onloadeddata = () => {
                console.log('音频加载成功');
                resultDiv.textContent = `音频加载成功，正在播放: ${word}`;
            };

            audio.onended = () => {
                console.log('播放完成');
                resultDiv.textContent = `播放完成: ${word}`;
            };

            audio.onerror = (error) => {
                console.error('播放错误:', error);
                resultDiv.textContent = `播放失败: ${word}`;
            };

            // 播放音频
            audio.play().catch(error => {
                console.error('播放启动失败:', error);
                resultDiv.textContent = `播放启动失败: ${error.message}`;
            });
        }
    </script>
</body>
</html>
